name: Release Rozgar to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: rozgar-release
  cancel-in-progress: true

jobs:
  deploy:
    name: Push to server and release
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: |
          if [ -f package-lock.json ]; then
            npm ci --no-audit --no-fund
          else
            npm install --no-audit --no-fund
          fi

      - name: Build production app
        run: npm run build

      - name: Setup SSH
        env:
          APP_SERVER_HOST: ${{ secrets.SERVER_HOST }}
          APP_SERVER_PORT: ${{ secrets.SERVER_PORT }}
          APP_SERVER_SSH_KEY: ${{ secrets.SERVER_SSH_KEY }}
          APP_SERVER_USER: ${{ secrets.SERVER_USER }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$APP_SERVER_SSH_KEY" > ~/.ssh/app_server
          chmod 600 ~/.ssh/app_server
          ssh-keyscan -p "$APP_SERVER_PORT" -H "$APP_SERVER_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          {
            echo "APP_SERVER_HOST=$APP_SERVER_HOST"
            echo "APP_SERVER_PORT=$APP_SERVER_PORT"
            echo "APP_SERVER_USER=$APP_SERVER_USER"
            echo "GIT_SSH_COMMAND=ssh -i ~/.ssh/app_server -p $APP_SERVER_PORT -o UserKnownHostsFile=~/.ssh/known_hosts"
          } >> "$GITHUB_ENV"

      - name: Push commit to server mirror
        run: |
          git remote remove server 2>/dev/null || true
          git remote add server "ssh://${APP_SERVER_USER}@${APP_SERVER_HOST}:${APP_SERVER_PORT}/home/kisvps/repos/rozgar.git"
          git push server HEAD:main

      - name: Trigger server release
        run: |
          ssh "${APP_SERVER_USER}@${APP_SERVER_HOST}" -p "$APP_SERVER_PORT" "cd /home/kisvps/public_html/rozgar.app && DEPLOY_BRANCH=main ./bin/server-deploy"

      - name: Verify public release
        run: |
          curl --fail --silent --show-error --location --max-time 30 https://rozgar.app > /tmp/rozgar-home.html
          grep -q "CVFY\\|Create your CV\\|Rojgar" /tmp/rozgar-home.html

      - name: Notify on failure
        if: failure()
        run: |
          echo "Release failed. Check SSH access, git push to server mirror, or server-side deploy logs."
